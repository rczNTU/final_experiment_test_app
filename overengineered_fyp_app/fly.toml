# fly.toml app configuration file generated for fyp-experiment-app on 2026-03-07T03:00:02+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fyp-experiment-app'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
[mounts]
  source = "leaderboard_data"
  destination = "/data"
