<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:monospace;
    overflow:hidden;
}

/* --------------------------
   Top-left HUD
-------------------------- */

#hud{
    position:fixed;
    top:20px;
    left:20px;
    z-index:1000;
}

#status{
    font-size:16px;
    margin-bottom:10px;
}

/* Leaderboard */
#miniBoard::-webkit-scrollbar{
    width:6px;
}

#miniBoard::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.3);
    border-radius:3px;
}

/* --------------------------
   Fixation cross
-------------------------- */

#fixation{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:80px;
    color:red;
    pointer-events:none;
    z-index:500;
}

/* --------------------------
   Break screen
-------------------------- */

#break{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    font-size:30px;
    z-index:200;
}
#graphContainer{
    margin-top:10px;
    padding:6px;
    background:rgba(255,255,255,0.04);
    border-radius:6px;
}

#rtGraph{
    width:150px;
    height:100px;
}
#feedback{
    margin-top:8px;
    font-size:14px;
    min-height:18px;
    opacity:0.9;
}
#rtTooltip{
    position:fixed;
    background:rgba(0,0,0,0.9);
    color:white;
    font-size:12px;
    padding:4px 6px;
    border-radius:4px;
    pointer-events:none;
    display:none;
    z-index:3000;
}
#alertLayer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:9999;
}

.alertSticker{
    font-size:60px;
    animation: alertPop 1.2s ease forwards;
    text-align:center;
}
.alertMascot{

    width:200px;

    animation: mascotPop 1.4s ease forwards;

}
.mascotAlert{
    position:absolute;
    text-align:center;
}

.mascotVideo{
    width:120px;
}

.mascotTextTop{
    font-size:24px;
}

.mascotTextBottom{
    font-size:14px;
}

@keyframes alertPop{

    0%{
        transform:scale(0.5) translateY(40px);
        opacity:0;
    }

    40%{
        transform:scale(1.2) translateY(0px);
        opacity:1;
    }

    70%{
        transform:scale(1);
    }

    100%{
        transform:scale(0.9) translateY(-30px);
        opacity:0;
    }
}


</style>

</head>

<body>
<div id="alertLayer"></div>
<!-- HUD (always top left) -->
<div id="hud">

    <div id="status">
    Baseline | Trial 0 / 15
    </div>

    <div id="miniBoard"></div>
    <div id="graphContainer">
        <canvas id="rtGraph" width="150" height="100"></canvas>
    </div>
    <div id="feedback"></div>
    <div id="rtTooltip"></div>

</div>



<!-- Fixation -->
<div id="fixation">
+
</div>


<!-- Break screen -->
<div id="break" style="display:none;">
  <div id="breakText"></div>
</div>


<script>
const PATTERN_ORDER = {{ pattern_order|tojson|safe }};
const USERNAME = {{ username|tojson|safe }};
</script>

<script type="module" src="/static/experiment.js"></script>
</body>
</html>
