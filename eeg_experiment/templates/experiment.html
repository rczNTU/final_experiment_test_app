<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:monospace;
    overflow:hidden;
}

/* --------------------------
   Top-left HUD
-------------------------- */

#hud{
    position:fixed;
    top:20px;
    left:20px;
    z-index:1000;
}

#status{
    font-size:16px;
    margin-bottom:10px;
}

/* Leaderboard */
#miniBoard{
    font-size:14px;
    line-height:1.4;
}

/* --------------------------
   Fixation cross
-------------------------- */

#fixation{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:80px;
    color:red;
    pointer-events:none;
    z-index:500;
}

/* --------------------------
   Break screen
-------------------------- */

#break{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    font-size:30px;
    z-index:200;
}

</style>

</head>

<body>

<!-- HUD (always top left) -->
<div id="hud">

    <div id="status">
    Baseline | Trial 0 / 15
    </div>

    <div id="miniBoard"></div>

</div>


<!-- Fixation -->
<div id="fixation">
+
</div>


<!-- Break screen -->
<div id="break" style="display:none;">
  <div id="breakText"></div>
</div>


<script>
const PATTERN_ORDER = {{ pattern_order|tojson|safe }};
const USERNAME = {{ username|tojson|safe }};
</script>

<script src="/static/experiment.js"></script>

</body>
</html>
